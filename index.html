<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #e8e0f0; }
  body { display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; }

  /* ── DESIGN TOKENS ── */
  :root {
    --bg: #FFF8F0; --bg2: #FFFFFF; --card: #FFFFFF; --card2: #FDF5EC;
    --teal: #00C2B2; --teal-dim: #E0FAF8; --teal-dim2: #B8F2EE; --teal-dark: #007A72;
    --txt: #1A1A2E; --muted: #9B8EA8; --border: #EDE8F5;
    --coral: #FF6B6B; --coral-bg: #FFF0F0;
    --amber: #FF9F43; --amber-bg: #FFF4E6;
    --lemon: #FECA57; --lemon-bg: #FFFDE7;
    --mint: #48DBBB;
    --sky: #54A0FF; --sky-bg: #EBF3FF;
    --lilac: #A29BFE; --lilac-bg: #F0EEFF;
    --green: #00B894; --green-bg: #E0FAF5;
    --orange: #FF9F43; --orange-bg: #FFF4E6;
    --red: #FF6B6B; --red-bg: #FFF0F0;
    --purple: #A29BFE;
    --shadow: 0 2px 16px rgba(26,26,46,0.08);
    --shadow-md: 0 6px 24px rgba(26,26,46,0.12);
    --shadow-lg: 0 12px 40px rgba(26,26,46,0.16);
  }

  /* ── PHONE SHELL ── */
  #app {
    width: 100%; max-width: 430px; height: 100vh; height: 100svh;
    background: var(--bg); display: flex; flex-direction: column;
    overflow: hidden; position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.3);
  }

  /* ── SCREENS ── */
  .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .scroll::-webkit-scrollbar { display: none; }

  /* ── TYPOGRAPHY ── */
  .f { font-family: 'Fredoka', sans-serif; }
  .n { font-family: 'Nunito', sans-serif; }

  /* ── BOTTOM NAV ── */
  #nav {
    display: flex; align-items: center; background: var(--bg2);
    border-top: 1.5px solid var(--border); flex-shrink: 0;
    box-shadow: 0 -4px 20px rgba(26,26,46,0.06); padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0; cursor: pointer; color: var(--muted); transition: color 0.2s; }
  .nav-tab.active { color: var(--tab-color, var(--teal)); }
  .nav-tab svg { width: 20px; height: 20px; }
  .nav-tab span { font-size: 9px; font-weight: 500; font-family: 'Nunito', sans-serif; }
  .nav-tab.active span { font-weight: 700; }
  .nav-cam {
    flex: 1; display: flex; flex-direction: column; align-items: center; padding-bottom: 8px;
  }
  .cam-btn {
    width: 58px; height: 58px; border-radius: 50%;
    background: linear-gradient(135deg, var(--teal), var(--mint));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 24px rgba(0,194,178,0.5), 0 0 0 4px var(--bg2);
    border: 3px solid var(--bg2); cursor: pointer; transform: translateY(-10px);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .cam-btn:active { transform: translateY(-8px) scale(0.96); }
  .cam-btn svg { width: 26px; height: 26px; }

  /* ── LOGO ── */
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-box {
    width: 32px; height: 32px; border-radius: 10px;
    background: linear-gradient(135deg, var(--teal), var(--mint));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(0,194,178,0.4);
  }
  .logo-text { font-family: 'Fredoka', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -0.3px; color: var(--txt); }
  .logo-text span { color: var(--teal); }

  /* ── BACK BUTTON ── */
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.9);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: var(--shadow); border: 1px solid var(--border); flex-shrink: 0;
  }

  /* ── CARDS ── */
  .card { background: var(--bg2); border-radius: 16px; box-shadow: var(--shadow); }
  .pill { border-radius: 999px; }

  /* ── TOAST ── */
  #toast {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--green-bg); border: 1.5px solid var(--green);
    border-radius: 20px; padding: 10px 20px; z-index: 999; white-space: nowrap;
    box-shadow: var(--shadow-md); font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700; color: var(--green); display: none;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
  @keyframes scanline { 0%{top:8%} 50%{top:75%} 100%{top:8%} }
  .fade-in { animation: fadeIn 0.3s ease; }

  /* ── SECTION TABS ── */
  .sec-tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 12px 6px; border-radius: 18px; cursor: pointer; background: var(--card);
    box-shadow: var(--shadow); transition: all 0.2s;
  }
  .sec-tab.active { box-shadow: var(--shadow-md); }
  .sec-tab .emoji { font-size: 26px; }
  .sec-tab .label { font-family: 'Fredoka', sans-serif; font-size: 12px; font-weight: 700; }
  .sec-tab .count { border-radius: 10px; padding: 2px 8px; font-size: 10px; font-weight: 600; font-family: 'Nunito', sans-serif; }

  /* ── FILTER PILLS ── */
  .filters { display: flex; gap: 6px; padding: 0 20px 16px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-pill {
    flex-shrink: 0; padding: 7px 14px; border-radius: 999px; font-size: 11px; font-weight: 700;
    background: var(--card); color: var(--muted); border: 1.5px solid var(--border);
    cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.2s; white-space: nowrap;
  }
  .filter-pill.active { background: var(--teal); color: #fff; border-color: var(--teal); }

  /* ── RECIPE CARD ── */
  .recipe-card { background: var(--card); border-radius: 20px; overflow: hidden; margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer; }
  .recipe-hero { display: flex; align-items: center; justify-content: center; position: relative; }
  .recipe-hero .emoji { font-size: 40px; }
  .recipe-hero.tall .emoji { font-size: 52px; }

  /* ── INGREDIENT CARD ── */
  .ing-card { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--card); border-radius: 16px; margin-bottom: 10px; box-shadow: var(--shadow); }

  /* ── EXPIRY BADGE ── */
  .exp-ok { background: var(--green-bg); color: var(--green); border: 1.5px solid rgba(0,184,148,0.3); }
  .exp-warn { background: var(--orange-bg); color: var(--orange); border: 1.5px solid rgba(255,159,67,0.3); }
  .exp-bad { background: var(--red-bg); color: var(--red); border: 1.5px solid rgba(255,107,107,0.3); }
  .exp-badge { font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 20px; white-space: nowrap; font-family: 'Nunito', sans-serif; }

  /* ── CUISINE PILL ── */
  .cuisine-pill { border-radius: 999px; padding: 1px 7px; font-size: 9px; font-weight: 700; font-family: 'Nunito', sans-serif; }

  /* ── ACTION CARD ── */
  .action-card { border-radius: 16px; padding: 14px; cursor: pointer; position: relative; overflow: hidden; }

  /* ── SCAN SCREEN ── */
  .scan-bg { flex: 1; background: #0a0f0e; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .scan-bracket { position: absolute; width: 28px; height: 28px; border-color: var(--teal); border-style: solid; border-width: 0; z-index: 10; opacity: 0.8; }
  .scan-line { position: absolute; left: 10%; right: 10%; height: 2px; background: linear-gradient(90deg, transparent, var(--teal), transparent); box-shadow: 0 0 12px var(--teal); z-index: 5; border-radius: 2px; animation: scanline 2.5s ease-in-out infinite; }
  .processing-step { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; width: 100%; max-width: 300px; }

  /* ── INPUT ── */
  input, textarea { font-family: 'Nunito', sans-serif; }
  input:focus, textarea:focus { outline: none; }

  /* ── KOLLECTION ── */
  .koll-card { background: var(--card); border-radius: 20px; padding: 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; cursor: pointer; position: relative; overflow: hidden; box-shadow: var(--shadow); }

  /* ── KALENDA ── */
  .week-day { flex-shrink: 0; min-width: 44px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer; padding: 8px 6px; border: 1.5px solid var(--border); background: var(--card); transition: all 0.2s; }
  .week-day.active { background: var(--teal-dim); border-color: var(--teal); }
  .macro-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 6px; text-align: center; box-shadow: var(--shadow); }
  .meal-card { margin: 0 16px 10px; background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); transition: all 0.2s; }
  .meal-card.swapping { background: var(--teal-dim); border-color: var(--teal); }
  .swap-sheet { border-top: 0.5px solid rgba(0,194,178,0.3); background: var(--teal-dim); padding: 12px 14px; }
  .swap-option { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--card); border-radius: 12px; margin-bottom: 8px; cursor: pointer; box-shadow: var(--shadow); }
</style>
</head>

function navigate(navName, screen) {
  state.activeNav = navName;
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
  const tab = document.getElementById("nav-" + navName);
  if (tab) tab.classList.add("active");
  showScreen(screen);
}

function showScreen(screen, opts = {}) {
  state.currentScreen = screen;
  const noNav = ["scanmode","scan"].includes(screen);
  document.getElementById("nav").style.display = noNav ? "none" : "flex";

  Object.assign(state, opts);
  render();
}

// ─────────────────────────────────────────────
// RENDER ENGINE
// ─────────────────────────────────────────────
function render() {
  const container = document.getElementById("screen-container");
  switch(state.currentScreen) {
    case "kitchen":   container.innerHTML = renderKitchen(); break;
    case "feed":      container.innerHTML = renderFeed(); break;
    case "kollection":container.innerHTML = renderKollection(); break;
    case "kalenda":   container.innerHTML = renderKalenda(); break;
    case "scanmode":  container.innerHTML = renderScanMode(); break;
    case "scan":      container.innerHTML = renderScan(); break;
    case "import":    container.innerHTML = renderImport(); break;
    default:          container.innerHTML = renderKitchen();
  }
}

function setFeedFilter(f) { state.feedFilter = f; render(); }
function toggleSave(id) {
  state.feedRecipes = state.feedRecipes.map(r => r.id===id ? {...r, saved: !r.saved} : r);
  render();
  showToast("Saved to Kollection!");
}
function toggleLike(id) {
  state.feedRecipes = state.feedRecipes.map(r => r.id===id ? {...r, liked:!r.liked, likes:r.liked?r.likes-1:r.likes+1} : r);
  render();
}

function renderKalenda() {
  const day = state.kalendaDay;
  const baseMeals = MEALS[day] || [];
  const meals = baseMeals.map((m,i) => state.mealOverrides[`${day}-${i}`] || m);
  const totalKcal = meals.reduce((s,m) => s+m.kcal, 0);

  const weekDays = WEEK.map(w => `
    <div class="week-day ${day===w.date?"active":""}" onclick="setKalendaDay(${w.date})">
      <span style="font-size:9px;color:${day===w.date?"var(--teal)":"var(--muted)"}">${w.day}</span>
      <span style="font-size:14px;font-weight:500;color:var(--txt)">${w.date}</span>
      ${w.today ? `<div style="width:4px;height:4px;background:var(--teal);border-radius:50%"></div>` : w.meals ? `<div style="width:4px;height:4px;background:var(--muted);border-radius:50%"></div>` : ""}
    </div>`).join("");

  const macros = [
    {label:"kcal",val:totalKcal},{label:"protein",val:"86g"},{label:"fat",val:"58g"},{label:"carbs",val:"195g"}
  ].map(m => `
    <div class="macro-card">
      <div style="font-size:13px;font-weight:500;color:var(--txt)">${m.val}</div>
      <div style="font-size:9px;color:var(--muted);margin-top:2px">${m.label}</div>
    </div>`).join("");

  const mealCards = meals.length === 0
    ? `<div style="text-align:center;padding:30px 20px">
        <div style="font-size:32px;margin-bottom:10px">📅</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:16px">No meals planned for this day</div>
        <div style="background:var(--teal);border-radius:12px;padding:10px 20px;display:inline-block;cursor:pointer;font-family:'Fredoka',sans-serif;font-size:13px;font-weight:700;color:#fff">✦ Ask kAI to plan this day</div>
      </div>`
    : meals.map((m,i) => {
        const isSwap = state.swapTarget === i;
        const swapOpts = isSwap ? (SWAP_OPTIONS[m.type]||[]).map((alt,ai) => `
          <div class="swap-option" onclick="doSwap(${i},${ai})">
            <div style="width:40px;height:40px;background:var(--teal-dim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px">${alt.emoji}</div>
            <div style="flex:1">
              <div style="font-size:12px;font-weight:600;color:var(--txt)">${alt.name}</div>
              <div style="font-size:10px;color:var(--muted);margin-top:2px">${alt.note} · ${alt.kcal} kcal</div>
            </div>
            <div style="color:var(--teal);font-size:11px;font-weight:600;flex-shrink:0">Use →</div>
          </div>`).join("") : "";

        return `<div class="meal-card ${isSwap?"swapping":""}">
          <div style="padding:12px 14px;display:flex;align-items:center;gap:12px">

function doSwap(mealIdx, altIdx) {
  const meals = MEALS[state.kalendaDay] || [];
  const m = state.mealOverrides[`${state.kalendaDay}-${mealIdx}`] || meals[mealIdx];
  const alt = (SWAP_OPTIONS[m.type]||[])[altIdx];

}

function toggleScanAdd(name, btn) {
  const added = state.addedScanItems;
  if (added.includes(name)) {
    state.addedScanItems = added.filter(n => n !== name);
    btn.textContent = "+ Add";
    btn.style.background = "transparent";
    btn.style.color = "var(--teal)";
    btn.style.borderColor = "var(--border)";
    btn.parentElement.style.background = "var(--card)";
    btn.parentElement.style.borderColor = "var(--border)";
  } else {
    state.addedScanItems = [...added, name];
    btn.textContent = "✓ Added";
    btn.style.background = "var(--teal)";
    btn.style.color = "#fff";
    btn.style.borderColor = "var(--teal)";
    btn.parentElement.style.background = "var(--teal-dim)";
    btn.parentElement.style.borderColor = "var(--teal)";
  }
  // Update counter
  const counter = document.querySelector('[data-counter="added"]');
  if(counter) counter.textContent = state.addedScanItems.length;
}

// ── REAL CLAUDE VISION API ──
async function handleCapture(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async (ev) => {
    const dataUrl = ev.target.result;
    const base64 = dataUrl.split(",")[1];
    const mimeType = file.type || "image/jpeg";
    state.scanImage = dataUrl;
    state.scanPhase = "processing";
    render();

    await analyzeWithClaude(base64, mimeType);
  };
  reader.readAsDataURL(file);
}

async function analyzeWithClaude(base64Image, mimeType) {
  const mode = SCAN_MODES[state.scanMode] || SCAN_MODES.fridge;

  // ⚠️ REPLACE THIS WITH YOUR CLAUDE API KEY
  // In production, use a backend proxy — never expose keys in HTML
  

  try {
    const response = await fetch("/api/scan", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        
        
        
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            {
              type: "image",
              source: { type: "base64", media_type: mimeType, data: base64Image }
            },
            {
              type: "text",
              text: `You are a food recognition AI for KaiLens smart kitchen app.
Analyse this ${mode.label} image and identify ALL visible food items.
Return ONLY a valid JSON array — no explanation, no markdown, no backticks.
Each item: {"name":"string","emoji":"single emoji","amount":"string","section":"${state.scanMode}","status":"ok|warn|bad","expiry":"string","confidence":0-100}
Example: [{"name":"Eggs","emoji":"🥚","amount":"6 count","section":"fridge","status":"ok","expiry":"1 week","confidence":98}]
Return empty array [] if nothing found.`
            }
          ]
        }]
      })
    });

    if (!response.ok) throw new Error(`API ${response.status}: ${await response.text()}`);

    const data = await response.json();
    const text = data.content[0].text;
    const clean = text.replace(/```json/g,"").replace(/```/g,"").trim();
    const items = JSON.parse(clean);

    state.scannedItems = Array.isArray(items) ? items : [];
    state.scanPhase = "results";
    render();
  } catch(err) {
    console.error("Scan error:", err);
    state.scanError = err.message.includes("API_KEY") || err.message.includes("401")
      ? "Invalid API key. Please add your Claude API key in the HTML file."
      : err.message || "Could not analyse image. Please try again.";
    state.scanPhase = "error";
    render();
  }
}

    </div>

    <div style="margin:0 20px 14px">
      <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px">Paste video link</div>
      <div style="background:var(--card);border:2px solid ${url?"var(--teal)":"var(--border)"};border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)">
        <svg width="16" height="16" fill="none" stroke="${url?"var(--teal)":"var(--muted)"}" stroke-width="2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <input id="import-url" value="${url}" oninput="setImportUrl(this.value)" placeholder="https://tiktok.com/..." style="flex:1;background:transparent;border:none;color:var(--txt);font-size:13px;font-family:'Nunito',sans-serif">
        ${url?`<span onclick="setImportUrl('')" style="color:var(--muted);cursor:pointer;font-size:18px;line-height:1">×</span>`:""}
      </div>
    </div>

    ${!url ? `<div style="padding:0 20px 16px">
      <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px">Try an example:</div>
      ${examples.map(e=>`
        <div onclick="setImportUrl('${e.url}')" style="padding:10px 14px;background:var(--card);border-radius:14px;margin-bottom:8px;cursor:pointer;border:1.5px solid var(--border);display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)">
          <span style="font-size:18px">${e.icon}</span>
          <span style="font-size:11px;color:var(--muted)">${e.url}</span>
        </div>`).join("")}
    </div>` : ""}

    <div style="margin:0 20px 16px;background:var(--teal-dim);border:2px solid rgba(0,194,178,0.3);border-radius:16px;padding:14px">
      <div class="f" style="font-size:14px;font-weight:700;color:var(--teal-dark);margin-bottom:10px">✦ What kAI extracts:</div>
      ${[["🍽️","Recipe title & description"],["🥕","Full ingredients with amounts"],["👨‍🍳","Step-by-step cooking guide"],["🔪","Required tools & equipment"],["⏱️","Cook time, serves & difficulty"]].map(([ic,lb])=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <span style="font-size:16px">${ic}</span>
          <span style="font-size:12px;color:var(--muted)">${lb}</span>

    ${s === "idle" ? `<div style="margin:0 20px">

        ${url ? "Extract Recipe with kAI →" : "Paste a link to continue"}
      </div>
    </div>` : ""}

    ${s === "loading" ? `<div style="margin:0 20px;background:var(--teal-dim);border:2px solid rgba(0,194,178,0.4);border-radius:16px;padding:16px">
      <div class="f" style="color:var(--teal);font-size:14px;font-weight:700;margin-bottom:12px;text-align:center">✦ kAI is reading the video...</div>
      ${["Fetching video & caption","Identifying ingredients","Extracting cooking steps","Detecting tools needed"].map((step,i)=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div style="width:22px;height:22px;border-radius:50%;background:${i<2?"var(--teal)":"var(--teal-dim)"};border:${i===2?`1.5px solid var(--teal)`:"none"};display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;flex-shrink:0">${i<2?"✓":""}</div>
          <span style="font-size:12px;color:${i<2?"var(--teal)":i===2?"var(--txt)":"var(--muted)"};font-weight:${i<2?600:400}">${step}</span>

    ${s === "done" ? `<div style="margin:0 20px;background:var(--green-bg);border:2px solid rgba(0,184,148,0.4);border-radius:14px;padding:14px;text-align:center">
      <div class="f" style="color:var(--green);font-size:16px;font-weight:700">✓ Recipe extracted!</div>
    </div>` : ""}

    <div style="height:24px"></div>
  </div>`;
}

function setImportUrl(v) {
  state.importUrl = v;
  state.importState = "idle";
  render();
  setTimeout(() => {
    const el = document.getElementById("import-url");
    if(el){ el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }, 10);
}

function doImport() {
  if (!state.importUrl.trim()) return;
  state.importState = "loading";
  render();
  setTimeout(() => {
    state.importState = "done";
    render();
    setTimeout(() => {
      showToast("Recipe saved to Kollection!");
      navigate("Kollection", "kollection");
    }, 800);
  }, 2800);
}
